<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shenandoah Tote Rental</title>
  <link rel="stylesheet" href="styles.css" />
</head>
  
<body>

  <div class="container">

    <h1>Shenandoah Tote Rental</h1>

    <!-- PACKAGES -->
    <div class="section">
      <h2>Choose Your Move Size</h2>

      <button id="lightMoveBtn">Light Move ($49)</button>
      <button id="familyMoveBtn">Family Move ($99)</button>
      <button id="fullMoveBtn">Full House ($159)</button>
    </div>

    <!-- BUILD -->
    <div class="section">
      <h2>Build Your Own</h2>

      <select id="classicTotes">
        <option value="0">0</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="30">30</option>
      </select>

      <select id="wheeledTotes">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="4">4</option> <!-- FIXED -->
      </select>

      <select id="dollies">
        <option value="0">0</option>
        <option value="1">1</option>
      </select>

      <select id="mattressBags">
        <option value="0">0</option>
        <option value="1">1</option> <!-- FIXED -->
        <option value="2">2</option>
        <option value="4">4</option>
      </select>
    </div>

    <!-- SUMMARY -->
    <div class="section">
      <h3>Total: $<span id="orderTotal">0</span></h3>
    </div>

    <!-- PAYPAL -->
    <div id="paypal-button-container"></div>

  </div>

  <!-- PAYPAL SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=AfKgo-xVuvFllspJ20LCnMEmafBBC196-H0Wrof1J0phiFeNSNbaCINA5JQpRw18GNAR_vXTVEMvAoz&currency=USD"></script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {

    const classic = document.getElementById("classicTotes");
    const wheeled = document.getElementById("wheeledTotes");
    const dollies = document.getElementById("dollies");
    const mattress = document.getElementById("mattressBags");
    const totalEl = document.getElementById("orderTotal");

    function updateTotal() {
      const total =
        (parseInt(classic.value) * 2) +
        (parseInt(wheeled.value) * 5) +
        (parseInt(dollies.value) * 10) +
        (parseInt(mattress.value) * 3);

      totalEl.textContent = total;
    }

    // PACKAGE BUTTONS
    document.getElementById("lightMoveBtn").onclick = function () {
      classic.value = "10";
      wheeled.value = "1";
      dollies.value = "0";
      mattress.value = "1";
      totalEl.textContent = 49;
    };

    document.getElementById("familyMoveBtn").onclick = function () {
      classic.value = "20";
      wheeled.value = "2";
      dollies.value = "1";
      mattress.value = "2";
      totalEl.textContent = 99;
    };

    document.getElementById("fullMoveBtn").onclick = function () {
      classic.value = "30";
      wheeled.value = "4";
      dollies.value = "1";
      mattress.value = "4";
      totalEl.textContent = 159;
    };

    // UPDATE TOTAL ON CHANGE
    [classic, wheeled, dollies, mattress].forEach(el => {
      el.addEventListener("change", updateTotal);
    });

    // PAYPAL
    paypal.Buttons({
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: totalEl.textContent || "0"
            }
          }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert("Payment successful!");
        });
      }
    }).render('#paypal-button-container');

  });
  </script>

</body>
</html>
