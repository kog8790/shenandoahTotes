<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Shenandoah Tote Rental</title>

  <link rel="stylesheet" href="styles.css" />

</head>

  

<body>

  <!-- HERO -->

  <div class="hero">

    <img src="logo.png" class="logo" alt="Shenandoah Tote Rental Logo">

  </div>

  <hr>

  <div class="container">

    <h1>Shenandoah Tote Rental</h1>

    <p>A cleaner, easier way to move in the Shenandoah Valley.</p>

    <!-- BUILD YOUR OWN -->

    <div class="build-section section">

      <h2>Build Your Own</h2>

      <div class="build-grid">

        <div class="item-row">

          <label for="classicTotes">Classic Tote</label>

          <select id="classicTotes">

            <option value="0">0</option>

            <option value="10">10</option>

            <option value="20">20</option>

          </select>

        </div>

        <div class="item-row">

          <label for="wheeledTotes">Wheeled Tote</label>

          <select id="wheeledTotes">

            <option value="0">0</option>

            <option value="1">1</option>

            <option value="2">2</option>

          </select>

        </div>

      </div>

    </div>

    <!-- FORM -->

    <div class="customer-form-wrapper" id="customerForm">

      <h2>Reservation Details</h2>

      <form id="bookingForm" class="customer-form">

        <div>

          <label>Full Name</label>

          <input type="text" required>

        </div>

        <div>

          <label>Email</label>

          <input type="email" required>

        </div>

        <div>

          <label>Pickup Address</label>

          <input type="text" required>

        </div>

        <!-- ORDER SUMMARY -->

        <div class="order-summary full-width">

          <h3>Your Reservation Summary</h3>

          <div id="summaryDetails"></div>

          <p class="total">Total: $<span id="orderTotal">50</span></p>

        </div>

        <!-- PAYPAL -->

        <div class="payment-section full-width">

          <h3>Pay Now to Secure Your Reservation</h3>

          <div id="paypal-button-container"></div>

        </div>

      </form>

    </div>

  </div>

  <!-- YOUR SCRIPT -->

  <script src="script.js"></script>

  <!-- PAYPAL SDK -->

  <script src="https://www.paypal.com/sdk/js?client-id=ARbQr8bv9h07149Z75ZF1aNEZ60AqNdldCKsdj58JyV23Za8P4eAQiVMEav9EGItsDhwSGszljvhInJY&currency=USD&components=buttons&enable-funding=venmo,paylater,card"></script>

  <script>

    paypal.Buttons({

      createOrder: function(data, actions) {

        const total = document.getElementById("orderTotal").innerText;

        return actions.order.create({

          purchase_units: [{

            amount: {

              value: total

            }

          }]

        });

      },

      onApprove: function(data, actions) {

        return actions.order.capture().then(function(details) {

          alert("Payment successful! Thank you " + details.payer.name.given_name);

          document.getElementById("bookingForm").submit();

        });

      }

    }).render('#paypal-button-container');

  </script>

</body>

</html>
